name: Build Installers

on:
  push:
    paths-ignore:
      - "Installer/**"
  workflow_dispatch:

concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-native-installers:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux installer (x64)
            os: ubuntu-22.04
            platform: linux
            arch: x64
          - label: Windows installer (x64)
            os: windows-latest
            platform: win32
            arch: x64
          - label: macOS installer (Intel)
            os: macos-15-intel
            platform: darwin
            arch: x64
          - label: macOS installer (Apple Silicon)
            os: macos-15
            platform: darwin
            arch: arm64

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build prerequisites
        if: matrix.platform == 'linux'
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y -o Dpkg::Use-Pty=0 \
            gcc \
            g++ \
            make \
            nasm \
            podman \
            flatpak \
            pkg-config \
            desktop-file-utils \
            libgtk-3-dev \
            libdbus-glib-1-dev \
            libxt-dev \
            libx11-xcb-dev \
            libasound2-dev \
            libpulse-dev \
            libffi-dev
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install npm dependencies
        run: npm ci

      - name: Install MozillaBuild
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          if (-not (Test-Path 'C:\mozilla-build')) {
            $installerPath = Join-Path $env:RUNNER_TEMP 'MozillaBuildSetup-Latest.exe'
            Invoke-WebRequest `
              -Uri 'https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe' `
              -OutFile $installerPath
            Start-Process -FilePath $installerPath -ArgumentList '/S' -Wait
          }

          choco install -y nsis 7zip.commandline

          "MOZILLABUILD=C:\mozilla-build" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          @(
            'C:\mozilla-build\bin'
            'C:\mozilla-build\msys2\usr\bin'
            'C:\mozilla-build\moztools\bin'
            'C:\Program Files (x86)\NSIS'
            'C:\Program Files\7-Zip'
          ) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Choose Gecko checkout directory
        run: |
          if [[ "${{ matrix.platform }}" == "win32" ]]; then
            echo "GECKO_CHECKOUT_DIR=$RUNNER_TEMP/nodely-gecko" >> "$GITHUB_ENV"
          else
            echo "GECKO_CHECKOUT_DIR=$RUNNER_TEMP/firefox-esr" >> "$GITHUB_ENV"
          fi

      - name: Bootstrap Gecko ESR checkout
        run: |
          set -o pipefail

          if ! npm run gecko:bootstrap -- --checkout-dir "$GECKO_CHECKOUT_DIR" 2>&1 | tee gecko-bootstrap.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-bootstrap.log --mode bootstrap)"
            echo "::error title=Gecko bootstrap failed::$summary"
            exit 1
          fi

      - name: Write Gecko mozconfig
        run: |
          if [[ "${{ matrix.platform }}" == "linux" && "${{ matrix.arch }}" == "x64" ]]; then
            npm run gecko:mozconfig -- --checkout-dir "$GECKO_CHECKOUT_DIR" --mode full
            printf '%s\n' 'ac_add_options --without-wasm-sandboxed-libraries' >> "$GECKO_CHECKOUT_DIR/mozconfig.nodely"
          else
            npm run gecko:mozconfig -- --checkout-dir "$GECKO_CHECKOUT_DIR"
          fi

      - name: Build Gecko overlay target
        env:
          MOZCONFIG: mozconfig.nodely
          NODEJS: node
        run: |
          set -o pipefail

          if ! (
            cd "$GECKO_CHECKOUT_DIR"
            if [[ "${{ matrix.platform }}" == "darwin" ]]; then
              python ./mach configure
              python ./mach artifact install
              cd "$GITHUB_WORKSPACE"
              npm run gecko:sync -- --checkout-dir "$GECKO_CHECKOUT_DIR"
              npm run gecko:refresh-branding -- --checkout-dir "$GECKO_CHECKOUT_DIR" --mode compat
              cd "$GECKO_CHECKOUT_DIR"
              python ./mach build faster
            elif [[ "${{ matrix.platform }}" == "linux" && "${{ matrix.arch }}" == "x64" ]]; then
              python ./mach build
            else
              python ./mach build faster
            fi
          ) 2>&1 | tee gecko-build.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-build.log --mode build)"
            echo "::error title=Gecko overlay build failed::$summary"
            exit 1
          fi

      - name: Refresh artifact-build Nodely branding
        run: npm run gecko:refresh-branding -- --checkout-dir "$GECKO_CHECKOUT_DIR"

      - name: Run Nodely Gecko smoke verification
        if: matrix.platform == 'linux'
        continue-on-error: true
        run: npm run gecko:smoke -- --checkout-dir "$GECKO_CHECKOUT_DIR"

      - name: Package Gecko build
        env:
          MOZCONFIG: mozconfig.nodely
          NODEJS: node
        run: |
          set -o pipefail

          if ! (
            cd "$GECKO_CHECKOUT_DIR"
            python ./mach package
          ) 2>&1 | tee gecko-package.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-package.log --mode package)"
            echo "::error title=Gecko package failed::$summary"
            exit 1
          fi

      - name: Stage Gecko release artifact
        run: |
          set -o pipefail

          if ! npm run gecko:stage-release -- --checkout-dir "$GECKO_CHECKOUT_DIR" --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --channel ci 2>&1 | tee gecko-stage-release.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-stage-release.log --mode stage)"
            echo "::error title=Gecko release artifact staging failed::$summary"
            exit 1
          fi

      - name: Build platform installer
        run: |
          set -o pipefail
          installer_args=(
            --platform ${{ matrix.platform }}
            --arch ${{ matrix.arch }}
            --channel ci
            --no-sync
          )

          if [[ "${{ matrix.platform }}" != "linux" || "${{ matrix.arch }}" != "x64" ]]; then
            installer_args+=(--strict)
          fi

          if ! npm run installers -- "${installer_args[@]}" 2>&1 | tee installer-build.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log installer-build.log --mode installer)"
            echo "::error title=Installer build failed::$summary"
            exit 1
          fi

      - name: Verify Linux x64 installer set
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        run: |
          shopt -s nullglob
          required_patterns=(
            "out/make/linux/x64/Nodely-Browser-*-linux-x64.run"
            "out/make/linux/x64/Nodely-Browser-*-debian-x64.deb"
            "out/make/linux/x64/Nodely-Browser-*-ubuntu-x64.deb"
            "out/make/linux/x64/Nodely-Browser-*-linux-x64.flatpak"
          )

          for pattern in "${required_patterns[@]}"; do
            matches=($pattern)

            if [[ ${#matches[@]} -eq 0 ]]; then
              echo "Present Linux x64 installers:" >&2
              find out/make/linux/x64 -maxdepth 1 -type f -printf '  %f\n' | sort >&2 || true
              echo "::error title=Missing expected Linux x64 installer::$pattern"
              echo "Missing expected Linux x64 installer: $pattern" >&2
              exit 1
            fi
          done

      - name: Verify Ubuntu 22.04 / Linux Mint 21.3 compatibility
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        run: |
          shopt -s nullglob
          debs=(out/make/linux/x64/Nodely-Browser-*-ubuntu-x64.deb)
          if [[ ${#debs[@]} -ne 1 ]]; then
            echo "Expected exactly one Ubuntu DEB for Linux x64, found ${#debs[@]}." >&2
            printf '  %s\n' "${debs[@]}" >&2 || true
            exit 1
          fi
          if ! bash scripts/verify-ubuntu-deb-compat.sh --deb "${debs[0]}" 2>&1 | tee ubuntu-compat.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log ubuntu-compat.log --mode compat)"
            echo "::error title=Ubuntu 22.04 / Linux Mint 21.3 compatibility failed::$summary"
            exit 1
          fi

      - name: Upload installer output
        uses: actions/upload-artifact@v4
        with:
          name: installer-output-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/make
          if-no-files-found: error

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: installer-failure-logs-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            gecko-bootstrap.log
            gecko-build.log
            gecko-package.log
            gecko-stage-release.log
            installer-build.log
            ubuntu-compat.log
          if-no-files-found: ignore

  assemble-installer-directory:
    name: Assemble Installer Directory
    needs:
      - build-native-installers
    if: needs.build-native-installers.result == 'success'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Download installer outputs
        uses: actions/download-artifact@v4
        with:
          pattern: installer-output-*
          path: out/make
          merge-multiple: true

      - name: Ensure Installer directory exists
        run: |
          mkdir -p Installer

      - name: Prune managed installer slices before sync
        run: >
          npm run installers:prune --
          --target linux:arm64
          --target linux:x64
          --target win32:x64
          --target darwin:x64
          --target darwin:arm64

      - name: Sync finished installers into Installer
        run: |
          found_any=0

          for target in linux:x64 win32:x64 darwin:x64 darwin:arm64; do
            platform="${target%%:*}"
            arch="${target##*:}"

            if [[ -d "out/make/$platform/$arch" ]]; then
              found_any=1
              npm run installers:sync -- \
                --platform "$platform" \
                --arch "$arch" \
                --built-by github-actions \
                --build-workflow .github/workflows/installers.yml \
                --build-run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            fi
          done

          if [[ "$found_any" -ne 1 ]]; then
            echo "No installer outputs were downloaded from build jobs." >&2
            exit 1
          fi

      - name: Generate latest installer release notes
        run: >
          bash scripts/generate-release-notes.sh
          --output Installer/RELEASE_NOTES.MD
          --repo "$GITHUB_REPOSITORY"
          --base "${{ github.event.before }}"
          --head "$GITHUB_SHA"
          --ref "$GITHUB_REF_NAME"
          --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Derive release metadata
        id: release_meta
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, readdirSync, statSync } from "node:fs";
          import path from "node:path";

          import { extractInstallerVersion } from "./scripts/installers-lib.mjs";

          const allowedExtensions = new Set([".deb", ".rpm", ".flatpak", ".run", ".exe", ".dmg", ".pkg"]);
          const makeRoot = path.join("out", "make");
          const assetPaths = [];

          for (const platform of readdirSync(makeRoot, { withFileTypes: true })) {
            if (!platform.isDirectory()) {
              continue;
            }

            const platformDirectory = path.join(makeRoot, platform.name);

            for (const arch of readdirSync(platformDirectory, { withFileTypes: true })) {
              if (!arch.isDirectory()) {
                continue;
              }

              const archDirectory = path.join(platformDirectory, arch.name);

              for (const entry of readdirSync(archDirectory, { withFileTypes: true })) {
                if (!entry.isFile()) {
                  continue;
                }

                const extension = path.extname(entry.name).toLowerCase();

                if (!allowedExtensions.has(extension) || !entry.name.startsWith("Nodely-Browser-")) {
                  continue;
                }

                const assetPath = path.posix.join(
                  "out",
                  "make",
                  platform.name,
                  arch.name,
                  entry.name
                );

                if (!statSync(path.join(archDirectory, entry.name)).size) {
                  continue;
                }

                assetPaths.push(assetPath);
              }
            }
          }

          assetPaths.sort();

          if (!assetPaths.length) {
            throw new Error("No built installer assets were found under out/make to publish.");
          }

          const versions = [...new Set(assetPaths.map((assetPath) => extractInstallerVersion(path.basename(assetPath))).filter(Boolean))];

          if (versions.length !== 1) {
            throw new Error(`Expected exactly one built Nodely version, found: ${versions.join(", ")}`);
          }

          const version = versions[0];
          const outputPath = process.env.GITHUB_OUTPUT;

          appendFileSync(outputPath, `version=${version}\n`);
          appendFileSync(outputPath, `tag=nodely-${version}\n`);
          appendFileSync(outputPath, `title=Nodely ${version}\n`);
          appendFileSync(outputPath, "assets<<EOF\n");
          appendFileSync(outputPath, `${assetPaths.join("\n")}\n`);
          appendFileSync(outputPath, "EOF\n");
          NODE

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.title }}
          RELEASE_ASSETS: ${{ steps.release_meta.outputs.assets }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file Installer/RELEASE_NOTES.MD
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file Installer/RELEASE_NOTES.MD \
              --target "$GITHUB_SHA"
          fi

          while IFS= read -r asset; do
            if [[ -n "$asset" ]]; then
              gh release upload "$RELEASE_TAG" "$asset" --clobber
            fi
          done <<< "$RELEASE_ASSETS"

      - name: Commit promoted installers
        run: |
          if [[ -z "$(git status --porcelain -- Installer)" ]]; then
            echo "No Installer changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Installer
            git commit -m "chore: promote generated installers and notes"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload assembled Installer directory
        uses: actions/upload-artifact@v4
        with:
          name: Installer
          path: Installer
          if-no-files-found: error
