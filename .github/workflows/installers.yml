name: Build Installers

on:
  push:
    branches:
      - main
    paths-ignore:
      - "Installer/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native-installers:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux installer (x64)
            os: ubuntu-latest
            platform: linux
            arch: x64
          - label: Windows installer (x64)
            os: windows-latest
            platform: win32
            arch: x64
          - label: macOS installer (Intel)
            os: macos-15-intel
            platform: darwin
            arch: x64
          - label: macOS installer (Apple Silicon)
            os: macos-15
            platform: darwin
            arch: arm64

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build prerequisites
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            g++ \
            make \
            nasm \
            podman \
            flatpak \
            pkg-config \
            desktop-file-utils \
            libgtk-3-dev \
            libdbus-glib-1-dev \
            libxt-dev \
            libx11-xcb-dev \
            libasound2-dev \
            libpulse-dev \
            libffi-dev
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install npm dependencies
        run: npm ci

      - name: Install MozillaBuild
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          if (-not (Test-Path 'C:\mozilla-build')) {
            $installerPath = Join-Path $env:RUNNER_TEMP 'MozillaBuildSetup-Latest.exe'
            Invoke-WebRequest `
              -Uri 'https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe' `
              -OutFile $installerPath
            Start-Process -FilePath $installerPath -ArgumentList '/S' -Wait
          }

          choco install -y nsis 7zip.commandline

          "MOZILLABUILD=C:\mozilla-build" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          @(
            'C:\mozilla-build\bin'
            'C:\mozilla-build\msys2\usr\bin'
            'C:\mozilla-build\moztools\bin'
            'C:\Program Files (x86)\NSIS'
            'C:\Program Files\7-Zip'
          ) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Choose Gecko checkout directory
        run: |
          if [[ "${{ matrix.platform }}" == "win32" ]]; then
            echo "GECKO_CHECKOUT_DIR=$RUNNER_TEMP/nodely-gecko" >> "$GITHUB_ENV"
          else
            echo "GECKO_CHECKOUT_DIR=$RUNNER_TEMP/firefox-esr" >> "$GITHUB_ENV"
          fi

      - name: Bootstrap Gecko ESR checkout
        run: |
          set -o pipefail

          if ! npm run gecko:bootstrap -- --checkout-dir "$GECKO_CHECKOUT_DIR" 2>&1 | tee gecko-bootstrap.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-bootstrap.log --mode bootstrap)"
            echo "::error title=Gecko bootstrap failed::$summary"
            exit 1
          fi

      - name: Write Gecko mozconfig
        run: npm run gecko:mozconfig -- --checkout-dir "$GECKO_CHECKOUT_DIR"

      - name: Build Gecko overlay target
        env:
          MOZCONFIG: mozconfig.nodely
          NODEJS: node
        run: |
          set -o pipefail

          if ! (
            cd "$GECKO_CHECKOUT_DIR"
            if [[ "${{ matrix.platform }}" == "darwin" ]]; then
              python ./mach configure
              python ./mach artifact install
              cd "$GITHUB_WORKSPACE"
              npm run gecko:sync -- --checkout-dir "$GECKO_CHECKOUT_DIR"
              npm run gecko:refresh-branding -- --checkout-dir "$GECKO_CHECKOUT_DIR" --mode compat
              cd "$GECKO_CHECKOUT_DIR"
              python ./mach build faster
            else
              python ./mach build faster
            fi
          ) 2>&1 | tee gecko-build.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-build.log --mode build)"
            echo "::error title=Gecko overlay build failed::$summary"
            exit 1
          fi

      - name: Refresh artifact-build Nodely branding
        run: npm run gecko:refresh-branding -- --checkout-dir "$GECKO_CHECKOUT_DIR"

      - name: Run Nodely Gecko smoke verification
        if: matrix.platform == 'linux'
        continue-on-error: true
        run: npm run gecko:smoke -- --checkout-dir "$GECKO_CHECKOUT_DIR"

      - name: Package Gecko build
        env:
          MOZCONFIG: mozconfig.nodely
          NODEJS: node
        run: |
          set -o pipefail

          if ! (
            cd "$GECKO_CHECKOUT_DIR"
            python ./mach package
          ) 2>&1 | tee gecko-package.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-package.log --mode package)"
            echo "::error title=Gecko package failed::$summary"
            exit 1
          fi

      - name: Stage Gecko release artifact
        run: >
          npm run gecko:stage-release -- --checkout-dir "$GECKO_CHECKOUT_DIR"
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}
          --channel ci

      - name: Build platform installer
        run: |
          set -o pipefail

          if ! npm run installers -- --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --channel ci --strict --no-sync 2>&1 | tee installer-build.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log installer-build.log --mode installer)"
            echo "::error title=Installer build failed::$summary"
            exit 1
          fi

      - name: Verify Linux x64 installer set
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        run: |
          shopt -s nullglob
          required_patterns=(
            "out/make/linux/x64/Nodely-Browser-*-linux-x64.run"
            "out/make/linux/x64/Nodely-Browser-*-debian-x64.deb"
            "out/make/linux/x64/Nodely-Browser-*-ubuntu-x64.deb"
            "out/make/linux/x64/Nodely-Browser-*-fedora-x64.rpm"
            "out/make/linux/x64/Nodely-Browser-*-linux-x64.flatpak"
          )

          for pattern in "${required_patterns[@]}"; do
            matches=($pattern)

            if [[ ${#matches[@]} -eq 0 ]]; then
              echo "Present Linux x64 installers:" >&2
              find out/make/linux/x64 -maxdepth 1 -type f -printf '  %f\n' | sort >&2 || true
              echo "::error title=Missing expected Linux x64 installer::$pattern"
              echo "Missing expected Linux x64 installer: $pattern" >&2
              exit 1
            fi
          done

      - name: Verify Ubuntu 22.04 / Linux Mint 21.3 compatibility
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        run: |
          shopt -s nullglob
          debs=(out/make/linux/x64/Nodely-Browser-*-ubuntu-x64.deb)
          if [[ ${#debs[@]} -ne 1 ]]; then
            echo "Expected exactly one Ubuntu DEB for Linux x64, found ${#debs[@]}." >&2
            printf '  %s\n' "${debs[@]}" >&2 || true
            exit 1
          fi
          bash scripts/verify-ubuntu-deb-compat.sh --deb "${debs[0]}"

      - name: Upload installer output
        uses: actions/upload-artifact@v4
        with:
          name: installer-output-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/make
          if-no-files-found: error

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: installer-failure-logs-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            gecko-bootstrap.log
            gecko-build.log
            gecko-package.log
            installer-build.log
          if-no-files-found: ignore

  assemble-installer-directory:
    name: Assemble Installer Directory
    needs:
      - build-native-installers
    if: always()
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Download installer outputs
        uses: actions/download-artifact@v4
        with:
          pattern: installer-output-*
          path: out/make
          merge-multiple: true

      - name: Ensure Installer directory exists
        run: |
          mkdir -p Installer

      - name: Prune managed installer slices before sync
        run: >
          npm run installers:prune --
          --target linux:arm64
          --target linux:x64
          --target win32:x64
          --target darwin:x64
          --target darwin:arm64

      - name: Sync finished installers into Installer
        run: |
          found_any=0

          for target in linux:x64 win32:x64 darwin:x64 darwin:arm64; do
            platform="${target%%:*}"
            arch="${target##*:}"

            if [[ -d "out/make/$platform/$arch" ]]; then
              found_any=1
              npm run installers:sync -- \
                --platform "$platform" \
                --arch "$arch" \
                --built-by github-actions \
                --build-workflow .github/workflows/installers.yml \
                --build-run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            fi
          done

          if [[ "$found_any" -ne 1 ]]; then
            echo "No installer outputs were downloaded from build jobs." >&2
            exit 1
          fi

      - name: Commit promoted installers
        run: |
          if [[ -z "$(git status --porcelain -- Installer)" ]]; then
            echo "No Installer changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Installer
          git commit -m "chore: promote generated installers"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload assembled Installer directory
        uses: actions/upload-artifact@v4
        with:
          name: Installer
          path: Installer
          if-no-files-found: error
