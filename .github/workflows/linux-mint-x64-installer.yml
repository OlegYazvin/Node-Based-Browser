name: Build Linux Mint x64 Installer

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/linux-mint-x64-installer.yml"
      - "scripts/build-installers.mjs"
      - "scripts/installers-lib.mjs"
      - "scripts/verify-ubuntu-deb-compat.sh"
      - "gecko/scripts/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write

env:
  FIREFOX_ESR_VERSION: 140.9.1esr
  FIREFOX_ESR_REF: FIREFOX_140_9_1esr_RELEASE

jobs:
  build-linux-mint-x64:
    name: Build Linux Mint x64 installer
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build prerequisites
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y -o Dpkg::Use-Pty=0 \
            podman \
            flatpak \
            pkg-config \
            curl \
            xz-utils \
            zip \
            unzip \
            imagemagick \
            desktop-file-utils \
            libgtk-3-dev
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install npm dependencies
        run: npm ci

      - name: Choose Gecko checkout directory
        run: echo "GECKO_CHECKOUT_DIR=$RUNNER_TEMP/firefox-esr" >> "$GITHUB_ENV"

      - name: Bootstrap Gecko ESR checkout
        run: |
          set -o pipefail
          if ! npm run gecko:bootstrap -- --checkout-dir "$GECKO_CHECKOUT_DIR" --ref "$FIREFOX_ESR_REF" --no-sync --no-patches 2>&1 | tee gecko-bootstrap.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-bootstrap.log --mode bootstrap)"
            echo "::error title=Gecko bootstrap failed::$summary"
            exit 1
          fi

      - name: Prepare official ESR Linux x64 runtime
        run: |
          set -o pipefail

          runtime_url="https://archive.mozilla.org/pub/firefox/releases/${FIREFOX_ESR_VERSION}/linux-x86_64/en-US/firefox-${FIREFOX_ESR_VERSION}.tar.xz"
          runtime_archive="$RUNNER_TEMP/firefox-${FIREFOX_ESR_VERSION}.tar.xz"
          dist_dir="$GECKO_CHECKOUT_DIR/obj-nodely/dist"

          if ! curl --fail --location --retry 3 --retry-delay 10 --output "$runtime_archive" "$runtime_url" 2>&1 | tee official-esr-package.log; then
            echo "::error title=Official Firefox ESR download failed::Unable to download $runtime_url"
            exit 1
          fi

          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"
          tar -xJf "$runtime_archive" -C "$dist_dir"
          mv "$dist_dir/firefox" "$dist_dir/nodely"
          ln -sf firefox-bin "$dist_dir/nodely/nodely-bin"

      - name: Sync Nodely overlay into packaged runtime
        run: |
          set -o pipefail
          if ! npm run gecko:sync -- --checkout-dir "$GECKO_CHECKOUT_DIR" 2>&1 | tee gecko-sync.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-sync.log --mode stage)"
            echo "::error title=Nodely overlay sync failed::$summary"
            exit 1
          fi

      - name: Refresh artifact-build Nodely branding
        run: |
          set -o pipefail
          if ! npm run gecko:refresh-branding -- --checkout-dir "$GECKO_CHECKOUT_DIR" 2>&1 | tee gecko-refresh-branding.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-refresh-branding.log --mode stage)"
            echo "::error title=Nodely branding refresh failed::$summary"
            exit 1
          fi

      - name: Package prepared Nodely runtime
        run: |
          artifact="$GECKO_CHECKOUT_DIR/obj-nodely/dist/nodely-browser-${FIREFOX_ESR_VERSION}.en-US.linux-x86_64.tar.xz"
          tar -cJf "$artifact" -C "$GECKO_CHECKOUT_DIR/obj-nodely/dist" nodely
          tar -tf "$artifact" | grep -E '(^|/)nodely-bin$|(^|/)firefox-bin$|(^|/)libxul\.so$|(^|/)application\.ini$'

      - name: Stage Gecko release artifact
        run: |
          set -o pipefail
          if ! npm run gecko:stage-release -- --checkout-dir "$GECKO_CHECKOUT_DIR" --platform linux --arch x64 --channel ci 2>&1 | tee gecko-stage-release.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log gecko-stage-release.log --mode stage)"
            echo "::error title=Gecko release artifact staging failed::$summary"
            exit 1
          fi

      - name: Build platform installer
        run: |
          set -o pipefail
          if ! npm run installers -- --platform linux --arch x64 --channel ci --version "$FIREFOX_ESR_VERSION" --no-sync 2>&1 | tee installer-build.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log installer-build.log --mode installer)"
            echo "::error title=Installer build failed::$summary"
            exit 1
          fi

      - name: Verify Linux x64 installer set
        run: |
          shopt -s nullglob
          required_patterns=(
            "out/make/linux/x64/Nodely-Browser-*-ubuntu-x64.deb"
          )

          for pattern in "${required_patterns[@]}"; do
            matches=($pattern)
            if [[ ${#matches[@]} -eq 0 ]]; then
              echo "Present Linux x64 installers:" >&2
              find out/make/linux/x64 -maxdepth 1 -type f -printf '  %f\n' | sort >&2 || true
              echo "::error title=Missing expected Linux x64 installer::$pattern"
              exit 1
            fi
          done

      - name: Verify Ubuntu 22.04 / Linux Mint 21.3 compatibility
        run: |
          shopt -s nullglob
          debs=(out/make/linux/x64/Nodely-Browser-*-ubuntu-x64.deb)
          if [[ ${#debs[@]} -ne 1 ]]; then
            echo "Expected exactly one Ubuntu DEB for Linux x64, found ${#debs[@]}." >&2
            printf '  %s\n' "${debs[@]}" >&2 || true
            exit 1
          fi
          if ! bash scripts/verify-ubuntu-deb-compat.sh --deb "${debs[0]}" 2>&1 | tee ubuntu-compat.log; then
            summary="$(node scripts/summarize-ci-log.mjs --log ubuntu-compat.log --mode compat)"
            echo "::error title=Ubuntu 22.04 / Linux Mint 21.3 compatibility failed::$summary"
            exit 1
          fi

      - name: Report Linux Mint installer outputs
        run: |
          find out/make/linux/x64 -maxdepth 1 -type f -printf 'Installer output: %f\n' | sort
          echo "Linux Mint x64 verification uploads installers as workflow artifacts. The cross-platform installer workflow publishes release assets."

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-mint-x64-installer-failure-logs
          path: |
            gecko-bootstrap.log
            official-esr-package.log
            gecko-sync.log
            gecko-refresh-branding.log
            gecko-stage-release.log
            installer-build.log
            ubuntu-compat.log
          if-no-files-found: ignore

      - name: Upload Linux x64 installers
        uses: actions/upload-artifact@v4
        with:
          name: linux-mint-x64-installers
          path: out/make/linux/x64
          if-no-files-found: error
